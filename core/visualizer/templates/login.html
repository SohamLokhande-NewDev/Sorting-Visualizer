{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · SortViz</title>
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <style>
    html, body { height: 100%; }
    body { display: flex; align-items: center; justify-content: center; overflow: hidden; }

    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      background: var(--surface); border: 0.5px solid var(--border-hi);
      border-radius: var(--radius-lg); padding: 2.5rem;
      margin: 1rem;
    }
    .login-brand {
      font-size: 1rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--sky); margin-bottom: 1.8rem;
      display: flex; align-items: center; gap: 8px;
    }
    .login-title {
      font-size: 1.6rem; font-weight: 700; color: var(--text-hi); margin-bottom: 0.3rem;
    }
    .login-sub { font-size: 0.83rem; color: var(--text-mid); margin-bottom: 2rem; }

    .form-group { margin-bottom: 1.2rem; }
    .form-label {
      display: block; font-size: 0.73rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-lo); margin-bottom: 0.45rem;
    }
    .form-input {
      width: 100%; padding: 0.7rem 0.9rem;
      background: var(--bg3); border: 0.5px solid var(--border);
      border-radius: var(--radius); color: var(--text-hi);
      font-family: var(--font); font-size: 0.9rem;
      outline: none; transition: border-color var(--transition);
    }
    .form-input:focus { border-color: var(--sky); }
    .form-input::placeholder { color: var(--text-lo); }

    .login-btn {
      width: 100%; padding: 0.82rem;
      border-radius: var(--radius); border: none;
      background: var(--text-hi); color: #000000;
      font-family: var(--font); font-size: 0.95rem; font-weight: 700;
      transition: background var(--transition);
      margin-top: 0.5rem;
    }
    .login-btn:hover { background: var(--sky); color: #000; }

    .login-footer {
      margin-top: 1.4rem; text-align: center;
      font-size: 0.8rem; color: var(--text-mid);
    }
    .login-footer a { color: var(--sky); font-weight: 600; }

    .login-divider {
      display: flex; align-items: center; gap: 0.8rem; margin: 1.5rem 0;
      font-size: 0.72rem; color: var(--text-lo); letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 0.5px; background: var(--border);
    }

    .error-msg {
      background: rgba(248,113,113,0.08); border: 0.5px solid rgba(248,113,113,0.3);
      border-radius: var(--radius); padding: 0.7rem 0.9rem;
      font-size: 0.82rem; color: #f87171; margin-bottom: 1.2rem;
    }

    .theme-corner {
      position: fixed; top: 1.2rem; right: 1.5rem; z-index: 10;
      display: flex; gap: 8px;
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="theme-corner">
  <a href="{% url 'index' %}" class="nav-btn" style="padding:0 0.9rem;height:34px;display:flex;align-items:center;font-size:0.8rem;border:0.5px solid var(--border);border-radius:8px;color:var(--text-mid);">← Home</a>
  <button id="btn-theme" class="nav-btn" style="width:34px;height:34px;border:0.5px solid var(--border);border-radius:8px;background:transparent;color:var(--text-mid);">◑</button>
</div>

<div class="login-card reveal">
  <div class="login-brand">⬡ SortViz</div>
  <div class="login-title">Welcome back</div>
  <div class="login-sub">Sign in to save your visualisations and reports.</div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" name="username" placeholder="your username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn">Sign in →</button>
  </form>

  <div class="login-divider">or</div>
  <div class="login-footer">
    Don't have an account? <a href="#">Request access</a>
  </div>
</div>

<!-- CURSOR -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<canvas id="cursor-trail"></canvas>

<script src="{% static 'js/base.js' %}"></script>
</body>
</html>
